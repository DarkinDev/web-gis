<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="description" content="Hệ thống WebGIS quản lý xe buýt thông minh">
    <title>Đăng nhập — BusGIS</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css?v=3">
    
    <style>
        /* Global Loading Spinner */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }
        .spinner-custom {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner-custom"></div>
        <div class="fw-bold">Đang tải dữ liệu...</div>
    </div>

    <!-- Sidebar / Navigation -->
    <nav class="navbar navbar-expand-lg navbar-custom fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/map/">
                <i class="bi bi-bus-front-fill me-2"></i>
                Bus<span class="brand-highlight">GIS</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link " href="/map/">
                            <i class="bi bi-map me-1"></i>Bản đồ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/routes/">
                            <i class="bi bi-signpost-2 me-1"></i>Tuyến xe
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/stops/">
                            <i class="bi bi-geo-alt me-1"></i>Trạm dừng
                        </a>
                    </li>
                    
                    
                </ul>
                
                <div class="navbar-stats d-none d-lg-flex">
                    <div class="stat-item">
                        <i class="bi bi-signpost-split"></i>
                        <span>0 tuyến</span>
                    </div>
                    <div class="stat-item">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span>0 trạm</span>
                    </div>
                </div>

                <!-- Auth Buttons -->
                <div class="d-flex align-items-center ms-3 gap-2">
                    
                    <a href="/accounts/login/" style="background:var(--primary-color);color:#fff;border:none;border-radius:6px;padding:5px 14px;text-decoration:none;font-size:13px;font-weight:600;">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
                    </a>
                    
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Bottom Navigation Bar (≤768px only) -->
    <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
        <a href="/map/" class="mobile-nav-item ">
            <i class="bi bi-map"></i>
            <span>Bản đồ</span>
        </a>
        <a href="/routes/" class="mobile-nav-item ">
            <i class="bi bi-signpost-2"></i>
            <span>Tuyến xe</span>
        </a>
        <a href="/stops/" class="mobile-nav-item ">
            <i class="bi bi-geo-alt"></i>
            <span>Trạm dừng</span>
        </a>
        
        
        <a href="/accounts/login/" class="mobile-nav-item">
            <i class="bi bi-box-arrow-in-right"></i>
            <span>Đăng nhập</span>
        </a>
        
    </nav>

    <!-- Main Content -->
    <main>
        
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-light);padding:80px 16px 40px;">
  <div style="width:100%;max-width:420px;background:var(--bg-white);border:1px solid var(--border-color);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;">
    <div style="background:var(--bg-dark);border-bottom:1px solid var(--border-color);padding:36px 40px 28px;text-align:center;">
      <i class="bi bi-bus-front-fill" style="font-size:2.5rem;color:var(--primary-color);"></i>
      <h2 style="margin:10px 0 4px;color:var(--text-primary);font-weight:700;">BusGIS</h2>
      <p style="color:var(--text-secondary);margin:0;font-size:14px;">Đăng nhập vào hệ thống</p>
    </div>
    <div style="padding:36px 40px;">
      
      <form method="post">
        <input type="hidden" name="csrfmiddlewaretoken" value="5hfOSyZBGJx6ZYFPTr8ssTunMGqu6H12TaSovtWJFOB33eT7zzHnnCRgxHCbs54c">
        <input type="hidden" name="next" value="/management/users/">
        <div style="margin-bottom:18px;">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">Tên đăng nhập</label>
          <input type="text" name="username" autofocus required
            style="width:100%;background:var(--bg-light);color:var(--text-primary);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box;transition:border .2s;"
            onfocus="this.style.borderColor='var(--primary-color)'" onblur="this.style.borderColor='var(--border-color)'">
        </div>
        <div style="margin-bottom:10px;">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">Mật khẩu</label>
          <input type="password" name="password" required
            style="width:100%;background:var(--bg-light);color:var(--text-primary);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;font-size:14px;outline:none;box-sizing:border-box;transition:border .2s;"
            onfocus="this.style.borderColor='var(--primary-color)'" onblur="this.style.borderColor='var(--border-color)'">
        </div>
        <div style="text-align:right;margin-bottom:22px;">
          <a href="/accounts/password_reset/" style="color:var(--primary-color);font-size:13px;text-decoration:none;">Quên mật khẩu?</a>
        </div>
        <button type="submit"
          style="width:100%;background:var(--primary-color);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;"
          onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='1'">
          <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
        </button>
      </form>
    </div>
  </div>
</div>

    </main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    
</body>
</html>
