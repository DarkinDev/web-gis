<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
    .container { max-width: 580px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .header { background: linear-gradient(135deg, #f39c12, #e67e22); padding: 32px 40px; text-align: center; color: #fff; }
    .header h1 { margin: 0; font-size: 22px; font-weight: 700; }
    .body { padding: 32px 40px; }
    .info-box { background: #fff8ec; border-left: 4px solid #f39c12; border-radius: 0 8px 8px 0; padding: 16px 20px; margin: 20px 0; }
    .info-box p { margin: 4px 0; font-size: 14px; color: #334; }
    .info-box strong { color: #e67e22; }
    .footer { background: #f8fafd; padding: 20px 40px; text-align: center; color: #888; font-size: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✏️ BusGIS — Cập nhật tuyến xe</h1>
    <p>Thông báo tự động từ hệ thống</p>
  </div>
  <div class="body">
    <p>Xin chào Admin,</p>
    <p>Tuyến xe sau vừa được <strong>cập nhật</strong>:</p>
    <div class="info-box">
      <p><strong>Số hiệu:</strong> {{ route.route_number }}</p>
      <p><strong>Tên tuyến:</strong> {{ route.name }}</p>
      <p><strong>Điểm đầu:</strong> {{ route.start_point }}</p>
      <p><strong>Điểm cuối:</strong> {{ route.end_point }}</p>
    </div>
  </div>
  <div class="footer">BusGIS System &copy; 2026</div>
</div>
</body>
</html>
