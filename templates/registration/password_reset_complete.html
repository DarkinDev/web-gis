{% extends "base.html" %}
{% block title %}Đặt lại mật khẩu thành công — BusGIS{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 16px 40px;">
  <div style="width:100%;max-width:440px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.1);padding:40px;text-align:center;">
    <div style="width:80px;height:80px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
      <i class="bi bi-shield-check" style="font-size:2.5rem;color:#27ae60;"></i>
    </div>
    <h2 style="color:#1a2a3a;font-weight:700;">Mật khẩu đã được đặt lại!</h2>
    <p style="color:#666;font-size:15px;line-height:1.6;">Mật khẩu của bạn đã được thay đổi thành công. Bạn có thể đăng nhập bằng mật khẩu mới ngay bây giờ.</p>
    <a href="{% url 'login' %}" style="display:inline-block;background:linear-gradient(135deg,#0066cc,#004a99);color:#fff;text-decoration:none;padding:12px 32px;border-radius:8px;font-weight:600;font-size:15px;margin-top:8px;">
      <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập ngay
    </a>
  </div>
</div>
{% endblock %}
