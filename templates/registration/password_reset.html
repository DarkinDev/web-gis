{% extends "base.html" %}
{% block title %}Quên mật khẩu — BusGIS{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0066cc11,#004a9911);padding:80px 16px 40px;">
  <div style="width:100%;max-width:440px;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,102,204,.13);overflow:hidden;">
    <div style="background:linear-gradient(135deg,#0066cc,#004a99);padding:32px 40px 24px;text-align:center;">
      <i class="bi bi-envelope-open" style="font-size:2rem;color:#fff;"></i>
      <h2 style="margin:10px 0 4px;color:#fff;font-weight:700;">Quên mật khẩu?</h2>
      <p style="color:rgba(255,255,255,.8);margin:0;font-size:13px;">Nhập email để nhận link đặt lại mật khẩu</p>
    </div>
    <div style="padding:32px 40px;">
      <form method="post">
        {% csrf_token %}
        <div style="margin-bottom:20px;">
          <label style="display:block;font-size:13px;font-weight:600;color:#334;margin-bottom:6px;">Địa chỉ Email</label>
          <input type="email" name="email" required autofocus placeholder="example@email.com"
            style="width:100%;border:1.5px solid #dde3ea;border-radius:8px;padding:11px 14px;font-size:14px;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='#0066cc'" onblur="this.style.borderColor='#dde3ea'">
        </div>
        <button type="submit"
          style="width:100%;background:linear-gradient(135deg,#0066cc,#004a99);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;">
          <i class="bi bi-send me-2"></i>Gửi link đặt lại mật khẩu
        </button>
        <p style="text-align:center;margin-top:16px;font-size:13px;">
          <a href="{% url 'login' %}" style="color:#0066cc;text-decoration:none;">← Quay lại đăng nhập</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
